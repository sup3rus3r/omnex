name: Bug Report
description: Report a reproducible bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I have searched [existing issues](https://github.com/sup3rus3r/omnex/issues) and this has not been reported
          required: true
        - label: I have read the [architecture docs](https://github.com/sup3rus3r/omnex/blob/main/docs/ARCHITECTURE.md) and this is not expected behavior
          required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reliably reproduce the issue.
      placeholder: |
        1. Run `python -m ingestion --path /my/folder`
        2. Open UI at localhost:3000
        3. Query "find photos with Sarah"
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Layer affected
      options:
        - Ingestion Pipeline
        - Embeddings (text / image / face / code)
        - Storage (MongoDB / LEANN / binary store)
        - Query Engine / API
        - Voice + Text Interface (Next.js)
        - Face Clustering / Identity
        - LLM Integration (local / OpenAI / Anthropic)
        - FUSE Filesystem
        - MCP / Agent API
        - Docker / Services
        - Model Downloader
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Ubuntu 24.04, Windows 11, macOS 14
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: e.g. 3.11.8
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version (if frontend issue)
      placeholder: e.g. 20.11.0

  - type: input
    id: gpu
    attributes:
      label: GPU (if relevant)
      placeholder: e.g. NVIDIA RTX 3080 10GB / CPU-only

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant logs. Redact API keys and personal data before posting.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, file types being ingested, index size, or any other information that may help.
