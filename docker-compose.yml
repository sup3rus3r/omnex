services:

  # ── Omnex API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnex-api
    restart: unless-stopped
    networks:
      - omnex
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - '127.0.0.1:8001:8000'
    volumes:
      - omnex-models:/data/models
      - omnex-data:/data/leann
      - omnex-binary:/data/binary
      - ./api:/app/api
      - ./ingestion:/app/ingestion
      - ./embeddings:/app/embeddings
      - ./storage:/app/storage
    environment:
      MONGO_URI: mongodb://host.docker.internal:27017
      MONGO_DB: omnex
      OMNEX_DATA_PATH: /data
      LEANN_INDEX_PATH: /data/leann
      HF_HOME: /data/models/huggingface
      WHISPER_CACHE: /data/models/whisper
      TRANSFORMERS_OFFLINE: "0"
      HF_DATASETS_OFFLINE: "0"
      PYTHONPATH: /app
      GPU_ENABLED: "${GPU_ENABLED:-false}"
      TTS_ENGINE: "${TTS_ENGINE:-chatterbox}"
      TTS_KOKORO_VOICE: "${TTS_KOKORO_VOICE:-af_heart}"
      LOG_LEVEL: INFO
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    env_file:
      - path: .env
        required: false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 15s
      retries: 8
      start_period: 60s

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  interface:
    build:
      context: ./interface
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001
    container_name: omnex-interface
    restart: unless-stopped
    networks:
      - omnex
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '127.0.0.1:3007:3000'
    env_file:
      - path: ./interface/.env.local
        required: false

  # ── Omnex FUSE filesystem ──────────────────────────────────────────────────
  fuse:
    build:
      context: .
      dockerfile: fuse/Dockerfile
    container_name: omnex-fuse
    restart: unless-stopped
    networks:
      - omnex
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # FUSE requires privileged or at minimum SYS_ADMIN + /dev/fuse device
    privileged: true
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./fuse:/app/fuse
      - ./storage:/app/storage
      # Bind-mount the host directory where Omnex files will appear
      - type: bind
        source: ${OMNEX_FUSE_MOUNT:-./omnex-mount}
        target: /mnt/omnex
        bind:
          propagation: shared
    environment:
      MONGO_URI: mongodb://host.docker.internal:27017
      MONGO_DB: omnex
      OMNEX_DATA_PATH: /data
      LOG_LEVEL: INFO
    env_file:
      - path: .env
        required: false
    depends_on:
      api:
        condition: service_healthy

  # ── Ollama (optional local LLM) ────────────────────────────────────────────
  # Only started when LLM_PROVIDER=local. Run with:
  #   docker compose --profile local up -d
  ollama:
    profiles: [local]
    image: ollama/ollama:latest
    container_name: omnex-ollama
    restart: unless-stopped
    networks:
      - omnex
    volumes:
      - ./models/ollama:/root/.ollama
    ports:
      - '127.0.0.1:11434:11434'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:11434/']
      interval: 10s
      timeout: 5s
      retries: 5
    # Uncomment for NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  omnex:
    driver: bridge

volumes:
  omnex-models:
  omnex-data:
  omnex-binary:
